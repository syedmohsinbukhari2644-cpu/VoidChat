name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/Python /opt/hostedtoolcache/Ruby /usr/share/swift
          sudo docker system prune -a -f || true
          sudo apt-get clean

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/build-tools/35.0.0" >> $GITHUB_PATH

      - name: Accept Android Licenses
        run: yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1

      - name: Fix Expo dependencies (expo-av crash fix)
        run: npx expo install --fix
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1

      - name: Run Expo Prebuild
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1
          NODE_OPTIONS: "--max-old-space-size=4096"
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Set Gradle properties
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.daemon=false
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.configureondemand=true
          android.useAndroidX=true
          android.enableJetifier=true
          android.defaults.buildfeatures.buildconfig=true
          kotlin.incremental=false
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --build-cache \
            -x lint \
            -x lintVitalRelease \
            -x test \
            -x bundleRelease \
            --warning-mode=none
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          NODE_BINARY: node
          CI: 1
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dfile.encoding=UTF-8"

      - name: Find APK
        if: always()
        run: find android -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VOID-CHAT-APK
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
          if-no-files-found: warn
