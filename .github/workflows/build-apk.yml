name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Clean & Expo Prebuild
        run: |
          npx expo prebuild --platform android --clean

      - name: Grant Execute Permission to Gradlew
        run: |
          chmod +x android/gradlew

      - name: Clean Android build
        run: |
          cd android
          ./gradlew clean

      - name: Export NODE_BINARY for Gradle
        run: echo "NODE_BINARY=$(which node)" >> $GITHUB_ENV

      - name: Build Release APK
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m" -x lint -x lintVitalRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VOID-CHAT-RELEASE-APK
          path: android/app/build/outputs/apk/release/app-release.apk
