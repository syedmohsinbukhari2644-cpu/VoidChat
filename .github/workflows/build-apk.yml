name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Free Disk Space
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android/sdk
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/Python
          sudo rm -rf /opt/hostedtoolcache/Ruby
          sudo rm -rf /usr/share/swift
          sudo docker system prune -a -f || true
          sudo apt-get clean
          echo "=== Disk after cleanup ==="
          df -h /

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install npm dependencies
        run: |
          cd $GITHUB_WORKSPACE
          npm install --legacy-peer-deps --no-audit --no-fund
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1

      - name: Run Expo Prebuild
        run: |
          npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Set Gradle properties
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties << 'EOF'
          org.gradle.daemon=false
          org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.parallel=false
          org.gradle.configureondemand=false
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -x lint \
            -x lintVitalRelease \
            -x test \
            -x bundleRelease
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          NODE_BINARY: node
          CI: 1

      - name: List APK output (debug)
        if: always()
        run: |
          echo "=== Looking for APK files ==="
          find android -name "*.apk" 2>/dev/null || echo "No APK found"
          find android/app/build -type f 2>/dev/null | head -50 || echo "Build dir missing"

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VOID-CHAT-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: warn

      - name: Upload APK (signed fallback)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VOID-CHAT-APK-ALT
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
